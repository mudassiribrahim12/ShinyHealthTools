        width: 90%;

        margin-top: 0.5rem;

        background: #0f4a73;
      }
      body.modal-open {

      }

      /* chatbot */
      .chatbot-button {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: #0b3b5c;
        color: white;
        width: 56px;
        height: 56px;
        border-radius: 50%;

        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        border: none;
        z-index: 200;
        transition: transform 0.2s;
      }
      .chatbot-button:hover {
        transform: scale(1.1);
      }
      .chatbot-panel {
        position: fixed;
        bottom: 90px;
        right: 24px;
        width: 360px;
        height: 500px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 199;
        border: 1px solid #e0e8f2;
      }
      body.dark-theme .chatbot-panel {
        background: #26333f;
        border-color: #3d5067;
      }
      .chatbot-header {
        background: #0b3b5c;
        color: white;
        padding: 1rem;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .chatbot-header button {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .chatbot-messages {
        flex: 1;
        padding: 1rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
      }
      .message {
        max-width: 85%;
        padding: 0.6rem 1rem;
        border-radius: 18px;
        font-size: 0.9rem;
        line-height: 1.4;
        word-break: break-word;
      }
      .user-message {
        background: #0b3b5c;
        color: white;

      }
      .bot-message {
        background: #f0f5ff;

      }
      body.dark-theme .bot-message {
        background: #34495f;

      }
      .suggested-questions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;

        border-top: 1px solid #e0e8f2;
      }

        background: #eaf0fa;
        border: 1px solid #b8cde0;
        border-radius: 30px;
        padding: 0.4rem 1rem;
        font-size: 0.8rem;

        transition: background 0.2s;
        color: #0b3b5c;

      }
      body.dark-theme .suggested-question {

        color: #c6dcff;
      }

        background: #d0e0f5;
      }
      .chatbot-input-area {

       /* VS Code animation box - Professional fixed size with syntax highlighting */
      .code-animation-box {
        font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
        width: 100%;
        max-width: 500px;
        min-width: 500px;
        height: 380px;
        border-left: 6px solid #007acc;
        font-size: 0.9rem;
        line-height: 1.6;
        overflow-y: auto;
        position: relative;
        border: 1px solid #3c3c3c;
      }

      /* VS Code syntax highlighting colors */
      .code-animation-box .keyword { 
        color: #569cd6;
        font-weight: 500;
      }
      .code-animation-box .function { 
        color: #dcdcaa;
      }
      .code-animation-box .string { 
        color: #ce9178;
      }
      .code-animation-box .comment { 
        color: #6a9955;
      }
      .code-animation-box .number { 
        color: #b5cea8;
      }
      .code-animation-box .operator { 
        color: #d4d4d4;
      }
      .code-animation-box .variable { 
        color: #9cdcfe;
      }
      .code-animation-box .bracket { 
        color: #ffd700;
      }

      /* VS Code cursor animation */
      .code-animation-box .cursor {
        display: inline-block;
        width: 8px;
        height: 1.2em;
        background-color: #007acc;
        vertical-align: middle;
        animation: blink 1s infinite;
        margin-left: 2px;
      }

      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      /* VS Code scrollbar styling */
      .code-animation-box pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        height: 100%;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #007acc #2d2d2d;
        font-family: inherit;
      }

      .code-animation-box pre::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .code-animation-box pre::-webkit-scrollbar-track {
        background: #2d2d2d;
        border-radius: 4px;
      }

      .code-animation-box pre::-webkit-scrollbar-thumb {
        background: #007acc;
        border-radius: 4px;
        border: 2px solid #2d2d2d;
      }

      .code-animation-box pre::-webkit-scrollbar-thumb:hover {
        background: #1a8cff;
      }

      .code-animation-box pre::-webkit-scrollbar-corner {
        background: #1e1e1e;
      }

      /* VS Code status bar at bottom */
      .code-animation-box .status-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: #007acc;
        color: white;
        padding: 2px 10px;
        font-size: 0.7rem;
        display: flex;
        justify-content: space-between;
        opacity: 0.8;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        z-index: 10;
      }

      /* VS Code breadcrumb */
      .code-animation-box .breadcrumb {
        color: #8dc3f0;
        font-size: 0.7rem;
        padding-bottom: 8px;
        border-bottom: 1px solid #3c3c3c;
        margin-bottom: 8px;
      }

      /* Language indicator */
      .code-animation-box .language-badge {
        position: absolute;
        top: 10px;
        right: 15px;
        color: #6a9955;
        font-size: 0.7rem;
        font-family: 'Fira Code';
        background: #2d2d2d;
        padding: 2px 8px;
        border-radius: 12px;
        border: 1px solid #3c3c3c;
        z-index: 10;
      }

      /* VS Code minimap area */
      .code-animation-box .minimap {
        position: absolute;
        right: 0;
        top: 0;
        width: 60px;
        height: 100%;
        background: #252525;
        opacity: 0.3;
        pointer-events: none;
        z-index: 5;
      }

      /* Typing animation pulse */
      .code-animation-box .typing {
        animation: typePulse 0.1s ease-in-out;
      }

      @keyframes typePulse {
        0% { opacity: 0.7; }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.7; }
      }

      .hero-right {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      
      .hero-left {
        flex: 1;
      }
      
      .hero-container {
        display: flex;
        align-items: center;
        gap: 3rem;
      }

      @media (max-width: 900px) {
        .hero-container {
          flex-direction: column;
        }
        .hero-right {
          justify-content: center;
          width: 100%;
        }
        .code-animation-box {
          max-width: 100%;
          min-width: 100%;
          height: 350px;
        }
      }
      
      @media (max-width: 700px) {
        html { font-size: 14px; }
        .chatbot-panel { width: 300px; right: 16px; bottom: 80px; }
        .footer-columns { flex-direction: column; gap: 1.5rem; }
      }
    </style>
</head>

       // VS Code Animation Component - NOW WITH AUTO-TYPING EFFECT
      const CodeAnimation = () => {
        const [displayedCode, setDisplayedCode] = useState('');
        const [isTyping, setIsTyping] = useState(true);
        const [cursorVisible, setCursorVisible] = useState(true);
        
        const fullCode = `# # Load the ggplot2 package 
library(ggplot2)

# Generate sample data
set.seed(123)
data <- data.frame(
  group = rep(c("Control", "Treatment"), each = 30),
  response = c(rnorm(30, 10, 2), rnorm(30, 12, 2.5))
)
# Run statistical test
t_test <- t.test(response ~ group, data = data)

# Create publication plot
ggplot(data, aes(x = group, y = response, fill = group)) ]`;

        useEffect(() => {
          let i = 0;
          const typingSpeed = 30; // milliseconds per character
          let timeoutId;
          
          const typeNextChar = () => {
            if (i < fullCode.length) {
              setDisplayedCode(fullCode.substring(0, i + 1));
              i++;
              timeoutId = setTimeout(typeNextChar, typingSpeed);
            } else {
              setIsTyping(false);
              // Restart after 3 seconds when complete
              setTimeout(() => {
                setDisplayedCode('');
                i = 0;
                setIsTyping(true);
                timeoutId = setTimeout(typeNextChar, typingSpeed);
              }, 3000);
            }
          };
          
          // Start typing animation
          timeoutId = setTimeout(typeNextChar, 500);
          
          // Cursor blinking effect
          const cursorInterval = setInterval(() => {
            setCursorVisible(prev => !prev);
          }, 500);
          
          return () => {
            clearTimeout(timeoutId);
            clearInterval(cursorInterval);
          };
        }, []);

        return (
          <div className="code-animation-box">
            <pre>
              {displayedCode}
              <span style={{ 
                opacity: cursorVisible ? 1 : 0,
                backgroundColor: '#007acc',

      // ChatBot Component with vanishing questions on click
      const ChatBot = ({ appsData }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [messages, setMessages] = useState([
          { sender: 'bot', text: 'Hi! I\'m the ShinyHealthTools assistant. Ask me anything about our tools, features, or how to get started.' }
        ]);
        const [input, setInput] = useState('');
        const [showSuggestions, setShowSuggestions] = useState(true);
        const messagesEndRef = useRef(null);

        const suggestedQuestions = [
          "What tools are available?",
          "How many applications?",
          "Tell me about ROC Curve Builder",
          "Are these tools free?",
          "How do I cite ShinyHealthTools?",
          "What is Data2SPSS?",
          "Is source code available?",
          "Tell me about FactorGuard"
        ];

        const scrollToBottom = () => {
          messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        };

        useEffect(() => {
          scrollToBottom();
        }, [messages]);

        // Show suggestions when user focuses input or types
        useEffect(() => {
          if (input.length > 0) {
            setShowSuggestions(true);
          }
        }, [input]);

        const generateResponse = (question) => {
          const q = question.toLowerCase();
          
          // App-specific knowledge
          if (q.includes('roc') || q.includes('curve builder')) {
            const app = appsData.find(a => a.name.includes('ROC'));
            return app ? `**${app.name}**: ${app.desc}. It provides diagnostic accuracy analysis with AUC, confidence intervals, and comparisons. [Launch here](${app.run})` : "ROC Curve Builder is a tool for diagnostic accuracy analysis with AUC and confidence intervals.";
          }
          if (q.includes('dataspss') || q.includes('data2spss')) {
            const app = appsData.find(a => a.name.includes('Data2SPSS'));
            return app ? `**${app.name}**: ${app.desc}. Seamlessly convert data to SPSS format. [Launch](${app.run})` : "Data2SPSS converts data to SPSS (.sav) with metadata preservation.";
          }
          if (q.includes('factorguard') || q.includes('factor analysis')) {
            const app = appsData.find(a => a.name.includes('FactorGuard'));
            return app ? `**${app.name}**: ${app.desc}. Enterprise-grade exploratory factor analysis. [Launch](${app.run})` : "FactorGuard is our tool for exploratory factor analysis and dimension validation.";
          }
          if (q.includes('calcustats') || q.includes('sample size') || q.includes('power calculator')) {
            const app = appsData.find(a => a.name.includes('CalcuStats'));
            return app ? `**${app.name}**: ${app.desc}. Essential for clinical trial planning. [Launch](${app.run})` : "CalcuStats provides sample size and power calculations for clinical trials.";
          }
          if (q.includes('survival') || q.includes('kmplot') || q.includes('kaplan')) {
            const app = appsData.find(a => a.name.includes('KMPlot'));
            return app ? `**${app.name}**: ${app.desc}. Kaplan-Meier curves with log-rank tests. [Launch](${app.run})` : "KMPlot Genie creates Kaplan-Meier survival curves with log-rank tests.";
          }

          // General knowledge
          if (q.includes('how many') || q.includes('number of apps') || q.includes('tools available')) {
            return `We currently offer **${appsData.length} validated applications** covering sample size, ROC, survival, factor analysis, data conversion, and more.`;
          }
          if (q.includes('free') || q.includes('cost') || q.includes('license')) {
            return "All tools are **completely free** for academic, government, and non-profit institutions. No license fees, no subscriptions.";
          }
          if (q.includes('cite') || q.includes('citation')) {
            return "You can cite ShinyHealthTools as: 'Shiny Health Tools (2025). Statistical applications for health research. Retrieved from https://ShinyHealthTools.org'";
          }
          if (q.includes('source code') || q.includes('github') || q.includes('open source')) {
            return "All source code is available on GitHub at https://github.com/mudassiribrahim30. Fully open source under MIT license.";
          }
          if (q.includes('featured') || q.includes('popular')) {
            const featured = appsData.slice(0, 6).map(a => a.name).join(', ');
            return `Our featured applications include: ${featured}. All are highlighted on the homepage.`;
          }
          if (q.includes('hello') || q.includes('hi ') || q.includes('hey')) {
            return "Hello! How can I help you with ShinyHealthTools today?";
          }

          return "I'm not sure about that. You can try asking about specific apps (e.g., 'ROC Curve Builder'), general features, or visit our Applications page.";
        };

        const handleSend = (text) => {
          if (!text.trim()) return;
          setMessages(prev => [...prev, { sender: 'user', text }]);
          setShowSuggestions(false); // Hide suggestions after user sends a message
          setTimeout(() => {
            const response = generateResponse(text);
            setMessages(prev => [...prev, { sender: 'bot', text: response }]);
          }, 300);
          setInput('');
        };

        const handleSuggestionClick = (q) => {
          handleSend(q);
        };

        return (
          <>
            <button className="chatbot-button" onClick={() => setIsOpen(!isOpen)}>
              <i className="fas fa-comment"></i>
            </button>
            {isOpen && (
              <div className="chatbot-panel">
                <div className="chatbot-header">

                    <div key={idx} className={`message ${msg.sender === 'user' ? 'user-message' : 'bot-message'}`}>
                      {msg.text.split('**').map((part, i) => i % 2 ? <strong key={i}>{part}</strong> : part)}
                    </div>
                  ))}
                  <div ref={messagesEndRef} />
                </div>
                {showSuggestions && (
                  <div className="suggested-questions">
                    {suggestedQuestions.map((q, idx) => (
                      <span key={idx} className="suggested-question" onClick={() => handleSuggestionClick(q)}>
                        {q}
                      </span>
                    ))}
                  </div>
                )}
                <div className="chatbot-input-area">
                  <input 
                    type="text" 
                    placeholder="Type your question..." 
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleSend(input)}
                    onFocus={() => setShowSuggestions(true)}
                  />
                  <button onClick={() => handleSend(input)}><i className="fas fa-paper-plane"></i></button>
                </div>
              </div>
            )}
          </>
        );
      };
